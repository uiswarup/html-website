<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursor Blur Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: none;
    font-family: 'Raleway', sans-serif;
    background: #0a0a0f;
  }

  /* BLURRED layer - always visible */
  .blurred-layer {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, #1a0533 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, #0d1a3a 0%, transparent 55%),
      radial-gradient(ellipse at 60% 80%, #1a1a00 0%, transparent 50%),
      #0a0a0f;
    filter: blur(0px);
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .blurred-layer .content {
    text-align: center;
    filter: blur(12px);
    user-select: none;
    pointer-events: none;
  }

  .blurred-layer .content h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 900;
    color: #e8d5b7;
    line-height: 1;
    letter-spacing: -2px;
  }

  .blurred-layer .content p {
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    font-size: clamp(0.9rem, 2vw, 1.3rem);
    color: #a89070;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-top: 1.2rem;
  }

  /* Decorative blobs behind text */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.4;
    pointer-events: none;
    animation: drift 8s ease-in-out infinite;
  }
  .blob1 { width: 400px; height: 400px; background: #7c3aed; top: 10%; left: 5%; animation-delay: 0s; }
  .blob2 { width: 350px; height: 350px; background: #2563eb; top: 50%; right: 10%; animation-delay: -3s; }
  .blob3 { width: 300px; height: 300px; background: #d97706; bottom: 10%; left: 40%; animation-delay: -5s; }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 30px) scale(0.95); }
  }

  /* CLEAR layer - revealed by cursor mask */
  .clear-layer {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    /* CSS clip-path circle that follows cursor */
    clip-path: circle(0px at -100px -100px);
    transition: clip-path 0.05s ease-out;
  }

  .clear-layer-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, #1a0533 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, #0d1a3a 0%, transparent 55%),
      radial-gradient(ellipse at 60% 80%, #1a1a00 0%, transparent 50%),
      #0a0a0f;
  }

  .clear-layer .blob { filter: blur(60px); opacity: 0.4; }

  .clear-layer .content {
    position: relative;
    z-index: 3;
    text-align: center;
    user-select: none;
    pointer-events: none;
  }

  .clear-layer .content h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 900;
    background: linear-gradient(135deg, #f5e6c8 0%, #e8c87a 40%, #f0a040 80%, #c87941 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    letter-spacing: -2px;
    filter: drop-shadow(0 0 30px rgba(240, 180, 60, 0.4));
  }

  .clear-layer .content p {
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    font-size: clamp(0.9rem, 2vw, 1.3rem);
    color: #d4b896;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-top: 1.2rem;
  }

  /* Custom cursor */
  #cursor {
    position: fixed;
    z-index: 999;
    pointer-events: none;
    transform: translate(-50%, -50%);
    mix-blend-mode: normal;
  }

  #cursor .ring {
    width: 160px;
    height: 160px;
    border: 1.5px solid rgba(240, 180, 80, 0.7);
    border-radius: 50%;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow:
      0 0 0 1px rgba(240, 180, 80, 0.15),
      inset 0 0 20px rgba(240, 180, 80, 0.05);
    animation: pulse-ring 2.5s ease-in-out infinite;
  }

  #cursor .ring2 {
    width: 170px;
    height: 170px;
    border: 0.5px solid rgba(240, 180, 80, 0.25);
    border-radius: 50%;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: pulse-ring 2.5s ease-in-out infinite reverse;
  }

  #cursor .dot {
    width: 5px;
    height: 5px;
    background: rgba(240, 180, 80, 0.9);
    border-radius: 50%;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  @keyframes pulse-ring {
    0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.04); }
  }

  /* Hint text */
  .hint {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    color: rgba(200, 170, 120, 0.5);
    font-size: 0.75rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-family: 'Raleway', sans-serif;
    animation: fadeInUp 2s ease forwards 1s;
    opacity: 0;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* Dust particle canvas */
  #dustCanvas {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
  }

  /* Noise texture overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  }
</style>
</head>
<body>

<!-- BLURRED BACKGROUND LAYER -->
<div class="blurred-layer">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="content">
    <h1>Top<br>HTML CSS</h1>
    <p>Move your cursor</p>
  </div>
</div>

<!-- CLEAR REVEAL LAYER -->
<div class="clear-layer" id="clearLayer">
  <div class="clear-layer-bg"></div>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="content">
    <h1>Top<br>HTML CSS</h1>
    <p>Move your cursor</p>
  </div>
</div>

<!-- Custom Cursor -->
<div id="cursor">
  <div class="ring2"></div>
  <div class="ring"></div>
  <div class="dot"></div>
</div>

<canvas id="dustCanvas"></canvas>
<div class="hint">Move cursor to reveal ·  ·  ·</div>

<script>
  const cursor = document.getElementById('cursor');
  const clearLayer = document.getElementById('clearLayer');
  const RADIUS = 80; // px radius of clear circle

  let mouseX = -300, mouseY = -300;
  let curX = -300, curY = -300;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  // Hide hint after first move
  let hintHidden = false;
  document.addEventListener('mousemove', () => {
    if (!hintHidden) {
      hintHidden = true;
      document.querySelector('.hint').style.opacity = '0';
      document.querySelector('.hint').style.transition = 'opacity 0.5s ease';
    }
  });

  function lerp(a, b, t) { return a + (b - a) * t; }

  // ─── DUST PARTICLE SYSTEM ───────────────────────────────────
  const canvas = document.getElementById('dustCanvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const COLORS = [
    'rgba(240,180,80,',
    'rgba(200,140,255,',
    'rgba(80,180,255,',
    'rgba(255,220,100,',
    'rgba(255,160,80,',
    'rgba(180,220,255,',
  ];

  class Particle {
    constructor(x, y, fromCursor = false) {
      this.x = x;
      this.y = y;
      this.fromCursor = fromCursor;

      if (fromCursor) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 2.5 + 0.5;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - 1.2;
        this.size = Math.random() * 3 + 1;
        this.life = 1;
        this.decay = Math.random() * 0.025 + 0.012;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.glow = Math.random() > 0.5;
      } else {
        // Ambient floating dust
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = (Math.random() - 0.5) * 0.3 - 0.08;
        this.size = Math.random() * 1.5 + 0.3;
        this.life = Math.random();
        this.decay = Math.random() * 0.003 + 0.001;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.glow = false;
        this.maxLife = 0.4 + Math.random() * 0.4;
      }
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.life -= this.decay;
      if (this.fromCursor) {
        this.vx *= 0.97;
        this.vy *= 0.97;
        this.vy += 0.03; // gentle gravity
      }
    }

    draw() {
      if (this.life <= 0) return;
      const alpha = this.fromCursor
        ? this.life * 0.9
        : Math.sin(this.life / this.decay * 0.01) * this.maxLife;

      ctx.save();
      if (this.glow) {
        ctx.shadowBlur = 8;
        ctx.shadowColor = this.color + '0.8)';
      }
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = this.color + Math.max(0, Math.min(1, alpha)) + ')';
      ctx.fill();
      ctx.restore();
    }

    isDead() {
      return this.life <= 0 || this.x < -10 || this.x > canvas.width + 10 || this.y < -10 || this.y > canvas.height + 10;
    }
  }

  // Init ambient particles
  const particles = [];
  for (let i = 0; i < 120; i++) {
    const p = new Particle(0, 0, false);
    p.life = Math.random() * 0.5;
    particles.push(p);
  }

  // Spawn cursor particles on mouse move
  let lastSpawnX = -999, lastSpawnY = -999;
  document.addEventListener('mousemove', (e) => {
    const dx = e.clientX - lastSpawnX;
    const dy = e.clientY - lastSpawnY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 8) {
      const count = Math.floor(dist / 5) + 2;
      for (let i = 0; i < count; i++) {
        particles.push(new Particle(
          e.clientX + (Math.random() - 0.5) * 10,
          e.clientY + (Math.random() - 0.5) * 10,
          true
        ));
      }
      lastSpawnX = e.clientX;
      lastSpawnY = e.clientY;
    }
    // Keep array manageable
    if (particles.length > 600) particles.splice(0, particles.length - 600);
  });

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.update();
      p.draw();
      if (p.isDead()) {
        if (!p.fromCursor) {
          // Respawn ambient particles
          const np = new Particle(0, 0, false);
          np.x = Math.random() * canvas.width;
          np.y = Math.random() * canvas.height;
          particles[i] = np;
        } else {
          particles.splice(i, 1);
        }
      }
    }
  }

  function animateAll() {
    curX = lerp(curX, mouseX, 0.12);
    curY = lerp(curY, mouseY, 0.12);
    cursor.style.left = curX + 'px';
    cursor.style.top = curY + 'px';
    const clipX = lerp(parseFloat(clearLayer.style.clipPath?.match(/at (\S+)px/)?.[1] ?? curX), mouseX, 0.18);
    const clipY = lerp(parseFloat(clearLayer.style.clipPath?.match(/at \S+ (\S+)px/)?.[1] ?? curY), mouseY, 0.18);
    clearLayer.style.clipPath = `circle(${RADIUS}px at ${clipX}px ${clipY}px)`;
    drawParticles();
    requestAnimationFrame(animateAll);
  }

  animateAll();
</script>
</body>
</html>
