<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOPHTML Toggle</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital@0;1&display=swap');

    :root {
        --c1: #ff6ec4;
        --c2: #7873f5;
        --c3: #4adede;
        --c4: #ffe259;
        --c5: #ffa751;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'DM Sans', sans-serif;
        overflow: hidden;
        background: #fef9f4;
        transition: background 1.2s ease;
    }
    /* Animated gradient background */

    .bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: linear-gradient( 135deg, #fff1eb 0%, #fce4ec 20%, #ede7f6 40%, #e3f2fd 60%, #e8f5e9 80%, #fffde7 100% );
        background-size: 400% 400%;
        animation: bgShift 12s ease infinite;
        transition: opacity 0.8s;
    }

        .bg.on {
            background: linear-gradient( 135deg, #fcefff 0%, #ffe0f0 20%, #ffecd2 40%, #d4fcff 60%, #e0f7fa 80%, #f3e5f5 100% );
            background-size: 400% 400%;
            animation: bgShift 6s ease infinite;
        }

    @keyframes bgShift {
        0% {
            background-position: 0% 50%;
        }

        50% {
            background-position: 100% 50%;
        }

        100% {
            background-position: 0% 50%;
        }
    }
    /* Floating blobs */

    .blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.35;
        pointer-events: none;
        z-index: 0;
        transition: opacity 1s ease, transform 1s ease;
    }

    .blob1 {
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, #ff9a9e, #fad0c4);
        top: -100px;
        left: -100px;
        animation: blobMove1 14s ease-in-out infinite;
    }

    .blob2 {
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, #a18cd1, #fbc2eb);
        bottom: -80px;
        right: -80px;
        animation: blobMove2 18s ease-in-out infinite;
    }

    .blob3 {
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, #84fab0, #8fd3f4);
        bottom: 100px;
        left: 150px;
        animation: blobMove3 10s ease-in-out infinite;
    }

    .blob4 {
        width: 250px;
        height: 250px;
        background: radial-gradient(circle, #ffecd2, #fcb69f);
        top: 120px;
        right: 120px;
        animation: blobMove2 16s ease-in-out infinite reverse;
    }

    @keyframes blobMove1 {
        0%,100% {
            transform: translate(0,0) scale(1)
        }

        50% {
            transform: translate(60px,40px) scale(1.1)
        }
    }

    @keyframes blobMove2 {
        0%,100% {
            transform: translate(0,0) scale(1)
        }

        50% {
            transform: translate(-50px,-30px) scale(1.08)
        }
    }

    @keyframes blobMove3 {
        0%,100% {
            transform: translate(0,0) scale(1)
        }

        50% {
            transform: translate(30px,-50px) scale(1.12)
        }
    }

    .blob.on {
        opacity: 0.55;
    }
    /* Canvas */

    #three-canvas {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
    }
    /* Card */

    .card {
        position: relative;
        z-index: 10;
        background: rgba(255,255,255,0.55);
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        border: 1px solid rgba(255,255,255,0.8);
        border-radius: 32px;
        padding: 56px 64px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 36px;
        box-shadow: 0 8px 32px rgba(180,140,255,0.12), 0 2px 8px rgba(255,100,150,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
        transition: box-shadow 0.8s ease;
        min-width: 340px;
    }

        .card.on {
            box-shadow: 0 12px 60px rgba(120,115,245,0.25), 0 4px 16px rgba(255,110,196,0.18), inset 0 1px 0 rgba(255,255,255,0.95);
        }

    .title {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 13px;
        letter-spacing: 3px;
        background: linear-gradient(90deg, #ff6ec4, #7873f5, #4adede);
        background-size: 200%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: gradText 4s ease infinite;
        text-transform: uppercase;
    }

    @keyframes gradText {
        0%,100% {
            background-position: 0%
        }

        50% {
            background-position: 100%
        }
    }
    /* ── Toggle ─────────────────────────────── */

    .toggle-wrap {
        position: relative;
        cursor: pointer;
    }

    .toggle {
        width: 130px;
        height: 62px;
        border-radius: 31px;
        background: linear-gradient(135deg, #e8e0f5, #fce4ec, #e3f2fd);
        background-size: 200% 200%;
        border: 2px solid rgba(255,255,255,0.9);
        position: relative;
        transition: all 0.7s ease;
        box-shadow: 0 4px 20px rgba(150,120,255,0.12), inset 0 2px 4px rgba(255,255,255,0.8), inset 0 -1px 3px rgba(180,140,220,0.15);
        animation: trackIdle 8s ease infinite;
    }

    @keyframes trackIdle {
        0%,100% {
            background-position: 0% 50%
        }

        50% {
            background-position: 100% 50%
        }
    }

    .toggle.on {
        background: linear-gradient(135deg, #ff6ec4, #7873f5, #4adede, #ffe259, #ffa751);
        background-size: 300% 300%;
        animation: trackOn 3s ease infinite;
        box-shadow: 0 6px 30px rgba(120,115,245,0.4), 0 2px 10px rgba(255,110,196,0.3), inset 0 2px 4px rgba(255,255,255,0.4), inset 0 -1px 3px rgba(0,0,0,0.05);
        border-color: rgba(255,255,255,0.7);
        overflow: hidden;
    }

    @keyframes trackOn {
        0% {
            background-position: 0% 50%
        }

        50% {
            background-position: 100% 50%
        }

        100% {
            background-position: 0% 50%
        }
    }

    .knob {
        position: absolute;
        top: 5px;
        left: 5px;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: white;
        box-shadow: 0 3px 12px rgba(150,120,255,0.25), 0 1px 4px rgba(0,0,0,0.1), inset 0 1px 2px rgba(255,255,255,1);
        transition: transform 0.55s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.5s;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .toggle.on .knob {
        transform: translateX(68px);
        box-shadow: 0 4px 20px rgba(120,115,245,0.5), 0 2px 8px rgba(255,110,196,0.3), inset 0 1px 2px rgba(255,255,255,0.9);
    }
    /* Inner gradient circle on knob */

    .knob-inner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: linear-gradient(135deg, #e8e0f5, #fce4ec);
        transition: background 0.6s ease, box-shadow 0.6s;
    }

    .toggle.on .knob-inner {
        background: linear-gradient(135deg, #ff6ec4, #7873f5, #4adede);
        background-size: 200%;
        animation: knobGrad 2s ease infinite;
        box-shadow: 0 0 12px rgba(120,115,245,0.6);
        outline: 1px solid white;
    }

    @keyframes knobGrad {
        0%,100% {
            background-position: 0%
        }

        50% {
            background-position: 100%
        }
    }
    /* Shimmer on track */

    .shimmer {
        position: absolute;
        top: 0;
        left: -100%;
        width: 60%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
        border-radius: 31px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
    }

    .toggle.on .shimmer {
        opacity: 1;
        animation: shimmerAnim 2.5s ease-in-out infinite;
    }

    @keyframes shimmerAnim {
        0% {
            left: -100%
        }

        100% {
            left: 200%
        }
    }
    /* Status */

    .status-row {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #d8d0e8;
        transition: background 0.6s, box-shadow 0.6s;
    }

        .dot.on {
            background: linear-gradient(135deg, #ff6ec4, #7873f5);
            box-shadow: 0 0 8px rgba(120,115,245,0.6), 0 0 20px rgba(255,110,196,0.3);
            animation: dotPulse 1.8s ease-in-out infinite;
        }

    @keyframes dotPulse {
        0%,100% {
            transform: scale(1);
            opacity: 1
        }

        50% {
            transform: scale(1.4);
            opacity: 0.7
        }
    }

    .status-text {
        font-size: 11px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: #b8a8d0;
        transition: color 0.6s;
        font-weight: 500;
    }

        .status-text.on {
            background: linear-gradient(90deg, #ff6ec4, #7873f5, #4adede);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200%;
            animation: gradText 3s ease infinite;
        }
    /* Mode label */

    .mode-label {
        font-family: 'Playfair Display', serif;
        font-size: 28px;
        font-weight: 400;
        color: #c8b8e8;
        transition: all 0.8s ease;
        letter-spacing: -0.5px;
    }

        .mode-label.on {
            background: linear-gradient(135deg, #ff6ec4 0%, #7873f5 40%, #4adede 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200%;
            animation: gradText 4s ease infinite;
        }
    /* Rings */

    .ring {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(120,115,245,0.2);
        pointer-events: none;
        opacity: 0;
        transform: scale(0.8);
        transition: opacity 0.6s, transform 0.6s;
    }

    .ring1 {
        width: 160px;
        height: 160px;
        top: 50%;
        left: 50%;
        margin: -80px 0 0 -65px;
    }

    .ring2 {
        width: 220px;
        height: 220px;
        top: 50%;
        left: 50%;
        margin: -110px 0 0 -65px;
        border-color: rgba(255,110,196,0.15);
    }

    .card.on .ring1 {
        opacity: 1;
        transform: scale(1);
        animation: ringPulse1 3s ease-in-out infinite;
    }

    .card.on .ring2 {
        opacity: 1;
        transform: scale(1);
        animation: ringPulse2 3s ease-in-out infinite 0.5s;
    }

    @keyframes ringPulse1 {
        0%,100% {
            transform: scale(1)
        }

        50% {
            transform: scale(1.06)
        }
    }

    @keyframes ringPulse2 {
        0%,100% {
            transform: scale(1)
        }

        50% {
            transform: scale(1.04)
        }
    }
</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="blob blob1" id="b1"></div>
<div class="blob blob2" id="b2"></div>
<div class="blob blob3" id="b3"></div>
<div class="blob blob4" id="b4"></div>

<canvas id="three-canvas"></canvas>

<div class="card" id="card">
  <div class="ring ring1"></div>
  <div class="ring ring2"></div>
  <div class="title">TOPHTML Interface</div>
  <div class="mode-label" id="modeLabel">TOPHTML</div>
  <div class="toggle-wrap" id="toggleWrap">
    <div class="toggle" id="toggle">
      <div class="shimmer"></div>
      <div class="knob"><div class="knob-inner"></div></div>
    </div>
  </div>
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <div class="status-text" id="statusText">Standby</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Three.js ────────────────────────────────────────────────────
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.z = 14;

// Particles — pastel spectrum
const N = 500;
const pos = new Float32Array(N*3);
const col = new Float32Array(N*3);
const spd = new Float32Array(N);
const sz  = new Float32Array(N);

const palette = [
  [1.0,0.43,0.77], // pink
  [0.47,0.45,0.96], // violet
  [0.29,0.87,0.87], // cyan
  [1.0,0.89,0.35], // yellow
  [1.0,0.65,0.32], // orange
  [0.52,0.98,0.69], // mint
];

for (let i = 0; i < N; i++) {
  const r = 8 + Math.random()*8;
  const theta = Math.random()*Math.PI*2;
  const phi = Math.acos(2*Math.random()-1);
  pos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
  pos[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
  pos[i*3+2] = r*Math.cos(phi);
  const c = palette[Math.floor(Math.random()*palette.length)];
  col[i*3]=c[0]; col[i*3+1]=c[1]; col[i*3+2]=c[2];
  spd[i] = 0.3+Math.random()*0.7;
  sz[i]  = 1.5+Math.random()*4;
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
geo.setAttribute('color',    new THREE.BufferAttribute(col,3));
geo.setAttribute('aSize',    new THREE.BufferAttribute(sz,1));
geo.setAttribute('aSpd',     new THREE.BufferAttribute(spd,1));

const mat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:   { value: 0 },
    uToggle: { value: 0 },
  },
  vertexShader: `
    attribute float aSize;
    attribute float aSpd;
    attribute vec3 color;
    uniform float uTime;
    uniform float uToggle;
    varying vec3 vColor;
    varying float vAlpha;

    void main() {
      vColor = color;
      vec3 p = position;
      float t = uTime * aSpd * 0.25;
      // gentle orbiting
      float cosT = cos(t), sinT = sin(t);
      vec3 rotated = vec3(
        p.x*cosT - p.z*sinT,
        p.y + sin(t*0.7 + p.x)*0.3*uToggle,
        p.x*sinT + p.z*cosT
      );
      float dist = length(rotated);
      vAlpha = mix(0.05, 0.85, uToggle) * (0.4 + 0.6*sin(uTime*1.5 + dist));
      vec4 mv = modelViewMatrix * vec4(rotated, 1.0);
      gl_PointSize = aSize * (1.0 + uToggle*2.0) * (200.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    varying float vAlpha;
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if(d > 0.5) discard;
      float a = smoothstep(0.5, 0.0, d) * vAlpha;
      gl_FragColor = vec4(vColor, a);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexColors: true,
});

scene.add(new THREE.Points(geo, mat));

// Central bloom
const bloomGeo = new THREE.PlaneGeometry(20, 20);
const bloomMat = new THREE.ShaderMaterial({
  uniforms: { uTime:{value:0}, uToggle:{value:0} },
  vertexShader: `varying vec2 vUv; void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader: `
    uniform float uTime;
    uniform float uToggle;
    varying vec2 vUv;
    void main(){
      vec2 c = vUv - 0.5;
      float d = length(c);
      float r = 0.4 + 0.05*sin(uTime*1.2);
      vec3 col1 = vec3(1.0, 0.43, 0.77);
      vec3 col2 = vec3(0.47, 0.45, 0.96);
      vec3 col3 = vec3(0.29, 0.87, 0.87);
      float a1 = atan(c.y,c.x)/(2.*3.14159)+0.5;
      vec3 grad = mix(mix(col1,col2,a1),col3,sin(a1*3.14159));
      float alpha = smoothstep(r, 0.0, d) * uToggle * 0.25;
      alpha *= (0.7 + 0.3*sin(uTime*2.0));
      gl_FragColor = vec4(grad, alpha);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const bloom = new THREE.Mesh(bloomGeo, bloomMat);
bloom.position.z = -2;
scene.add(bloom);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Toggle ───────────────────────────────────────────────────────
let isOn = false;
let prog = 0;
const toggle = document.getElementById('toggle');
const card   = document.getElementById('card');
const bg     = document.getElementById('bg');
const dot    = document.getElementById('dot');
const label  = document.getElementById('modeLabel');
const status = document.getElementById('statusText');
const blobs  = document.querySelectorAll('.blob');

document.getElementById('toggleWrap').addEventListener('click', () => {
  isOn = !isOn;
  toggle.classList.toggle('on', isOn);
  card.classList.toggle('on', isOn);
  bg.classList.toggle('on', isOn);
  dot.classList.toggle('on', isOn);
  label.classList.toggle('on', isOn);
  status.classList.toggle('on', isOn);
  blobs.forEach(b => b.classList.toggle('on', isOn));
    label.textContent = isOn ? 'TOPHTML' : 'TOPHTML';
  status.textContent = isOn ? 'Active' : 'Standby';
});

// ── Render ───────────────────────────────────────────────────────
const clock = new THREE.Clock();
(function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  prog += ((isOn?1:0) - prog) * 0.04;

  mat.uniforms.uTime.value     = t;
  mat.uniforms.uToggle.value   = prog;
  bloomMat.uniforms.uTime.value   = t;
  bloomMat.uniforms.uToggle.value = prog;

  camera.position.x = Math.sin(t*0.1) * 1.5;
  camera.position.y = Math.cos(t*0.08) * 1.0;
  camera.lookAt(0,0,0);

  renderer.render(scene, camera);
})();
</script>
</body>
</html>
