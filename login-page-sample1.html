<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Light Login</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fef6e4 0%, #f3d2c1 50%, #e8a5c4 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }
        
        /* Animated background shapes */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            z-index: 0;
            animation: floatShape 20s ease-in-out infinite;
        }
        
        .shape-1 {
            width: 500px;
            height: 500px;
            background: linear-gradient(45deg, #ffbe0b, #fb5607);
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }
        
        .shape-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #8338ec, #3a86ff);
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }
        
        .shape-3 {
            width: 300px;
            height: 300px;
            background: linear-gradient(90deg, #ff006e, #8338ec);
            top: 50%;
            left: 10%;
            animation-delay: -10s;
        }
        
        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }
        
        /* Floating orbs */
        .orb {
            position: fixed;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            animation: orbFloat 8s ease-in-out infinite;
            z-index: 1;
        }
        
        .orb:nth-child(1) { left: 15%; animation-delay: 0s; }
        .orb:nth-child(2) { left: 35%; animation-delay: 2s; }
        .orb:nth-child(3) { left: 55%; animation-delay: 4s; }
        .orb:nth-child(4) { left: 75%; animation-delay: 6s; }
        
        @keyframes orbFloat {
            0%, 100% { 
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            10%, 90% { opacity: 1; }
            50% { 
                transform: translateY(-10vh) scale(1.5);
                opacity: 0.8;
            }
        }
        
        /* Main login card */
        .login-card {
            position: relative;
            z-index: 10;
            width: 380px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 35px 30px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.15),
                0 0 100px rgba(255, 255, 255, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.4);
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }
        
        .login-card:hover {
            transform: translateY(-5px) rotateX(2deg);
        }
        
        /* Glossy reflection */
        .card-gloss {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, 
                rgba(255, 255, 255, 0.4) 0%, 
                transparent 30%, 
                transparent 70%, 
                rgba(255, 255, 255, 0.1) 100%);
            pointer-events: none;
            border-radius: 40px;
        }
        
        /* Decorative elements */
        .decorative-line {
            position: absolute;
            height: 4px;
            background: linear-gradient(90deg, #ffbe0b, #fb5607, #ff006e, #8338ec, #3a86ff);
            border-radius: 2px;
            top: 0;
            left: 0;
            width: 0;
            animation: lineGrow 2s ease-out forwards;
        }
        
        @keyframes lineGrow {
            to { width: 100%; }
        }
        
        /* Melting drips from card */
        .melt-drip {
            position: absolute;
            bottom: -30px;
            width: 20px;
            height: 40px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 0 0 50% 50%;
            animation: melt 4s ease-in-out infinite;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .melt-drip:nth-child(1) { left: 15%; animation-delay: 0s; height: 35px; }
        .melt-drip:nth-child(2) { left: 35%; animation-delay: 0.8s; height: 45px; }
        .melt-drip:nth-child(3) { left: 55%; animation-delay: 1.6s; height: 30px; }
        .melt-drip:nth-child(4) { left: 75%; animation-delay: 2.4s; height: 40px; }
        
        @keyframes melt {
            0%, 100% { height: 35px; opacity: 0.6; }
            50% { height: 60px; opacity: 1; }
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h2 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffbe0b, #fb5607, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        
        .header p {
            color: #666;
            font-size: 12px;
            font-weight: 400;
        }
        
        /* Input groups */
        .input-group {
            margin-bottom: 18px;
            position: relative;
        }
        
        .input-group label {
            display: block;
            color: #333;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            width: 18px;
            height: 18px;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        
        .input-icon svg {
            width: 100%;
            height: 100%;
            fill: #999;
            transition: fill 0.3s ease;
        }
        
        .input-group input:focus + .input-icon svg {
            fill: #ffbe0b;
        }
        
        .input-group input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid transparent;
            border-radius: 12px;
            color: #333;
            font-size: 13px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        
        .input-group input::placeholder {
            color: #bbb;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #ffbe0b;
            background: #fff;
            box-shadow: 0 8px 25px rgba(255, 190, 11, 0.2);
        }
        
        .input-group input:focus + .input-icon {
            color: #ffbe0b;
        }
        
        /* Glossy button */
        .glossy-btn {
            width: 100%;
            padding: 13px;
            margin-top: 6px;
            background: linear-gradient(135deg, #ffbe0b 0%, #fb5607 50%, #ff006e 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 10px 25px rgba(255, 190, 11, 0.4),
                inset 0 -5px 15px rgba(0, 0, 0, 0.2),
                inset 0 2px 5px rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        
        .glossy-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.4), 
                transparent);
            transition: left 0.5s ease;
        }
        
        .glossy-btn:hover::before {
            left: 100%;
        }
        
        .glossy-btn:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 15px 35px rgba(255, 190, 11, 0.5),
                0 0 40px rgba(255, 0, 110, 0.3);
        }
        
        .glossy-btn:active {
            transform: translateY(0);
        }
        
        .glossy-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                rgba(255, 255, 255, 0.3) 0%, 
                transparent 50%);
            border-radius: 16px;
            pointer-events: none;
        }
        
        /* Secondary actions */
        .secondary-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            gap: 15px;
        }
        
        .forgot-link, .signup-link {
            font-size: 11px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .forgot-link {
            color: #666;
        }
        
        .forgot-link:hover {
            color: #333;
            text-decoration: underline;
        }
        
        .signup-link {
            background: linear-gradient(135deg, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid transparent;
        }
        
        .signup-link:hover {
            border-color: #8338ec;
            background: rgba(131, 56, 236, 0.1);
        }
        
        /* Social login */
        .social-login {
            margin-top: 22px;
            text-align: center;
        }
        
        .social-login p {
            color: #999;
            font-size: 10px;
            margin-bottom: 12px;
            position: relative;
        }
        
        .social-login p::before,
        .social-login p::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: #ddd;
        }
        
        .social-login p::before { left: 0; }
        .social-login p::after { right: 0; }
        
        .social-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #eee;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .social-btn svg {
            width: 16px;
            height: 16px;
            fill: #666;
        }
        
        .social-btn:hover {
            transform: translateY(-3px) scale(1.1);
            border-color: #ffbe0b;
            box-shadow: 0 8px 20px rgba(255, 190, 11, 0.3);
        }
        
        /* Success animation */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        .success-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .success-check {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffbe0b, #fb5607);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: white;
            box-shadow: 0 20px 60px rgba(255, 190, 11, 0.4);
            transform: scale(0);
            margin-bottom: 30px;
        }
        
        .success-text {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transform: translateY(20px);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .login-card {
                width: 90%;
                max-width: 400px;
                padding: 40px 30px;
                border-radius: 30px;
            }
            
            .header h2 {
                font-size: 28px;
            }
            
            .secondary-actions {
                flex-direction: column;
                gap: 15px;
            }
            
            .social-buttons {
                gap: 10px;
            }
            
            .shape-1, .shape-2, .shape-3 {
                filter: blur(80px);
            }
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .header h2 {
                font-size: 24px;
            }
            
            .glossy-btn {
                padding: 16px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Background shapes -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
    
    <!-- Floating orbs -->
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    
    <!-- Login card -->
    <div class="login-card" id="loginCard">
        <div class="card-gloss"></div>
        <div class="decorative-line"></div>
        
        <!-- Melting drips -->
        <div class="melt-drip"></div>
        <div class="melt-drip"></div>
        <div class="melt-drip"></div>
        <div class="melt-drip"></div>
        
        <div class="header">
            <h2>Welcome Back!</h2>
            <p>Enter your credentials to continue</p>
        </div>
        
        <div class="input-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
                <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                </span>
            </div>
        </div>
        
        <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                    </svg>
                </span>
            </div>
        </div>
        
        <button class="glossy-btn" id="loginBtn">SIGN IN</button>
        
        <div class="secondary-actions">
            <a href="#" class="forgot-link">Forgot password?</a>
            <a href="#" class="signup-link">Create account</a>
        </div>
        
        <div class="social-login">
            <p>Or continue with</p>
            <div class="social-buttons">
                <button class="social-btn" title="Google">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                </button>
                <button class="social-btn" title="Facebook">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                </button>
                <button class="social-btn" title="Apple">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <!-- Success overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-check" id="successCheck">✓</div>
        <div class="success-text" id="successText">Welcome!</div>
    </div>

    <script>
        const loginBtn = document.getElementById('loginBtn');
        const loginCard = document.getElementById('loginCard');
        const successOverlay = document.getElementById('successOverlay');
        const successCheck = document.getElementById('successCheck');
        const successText = document.getElementById('successText');
        
        // Button click animation with ripple
        loginBtn.addEventListener('click', function(e) {
            // Create ripple
            const ripple = document.createElement('span');
            const rect = this.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;
            
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.style.position = 'absolute';
            ripple.style.borderRadius = '50%';
            ripple.style.background = 'rgba(255, 255, 255, 0.5)';
            ripple.style.transform = 'scale(0)';
            ripple.style.animation = 'ripple 0.6s ease-out';
            
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
            
            // Card click animation
            anime({
                targets: loginCard,
                scale: [1, 0.95, 1],
                duration: 300,
                easing: 'easeOutElastic(1, .8)'
            });
            
            // Simulate login with success animation
            setTimeout(() => {
                successOverlay.classList.add('active');
                
                anime({
                    targets: successCheck,
                    scale: [0, 1.2, 1],
                    duration: 600,
                    easing: 'easeOutElastic(1, .6)'
                });
                
                anime({
                    targets: successText,
                    opacity: [0, 1],
                    translateY: [20, 0],
                    duration: 500,
                    delay: 400,
                    easing: 'easeOutQuad'
                });
                
                // Confetti effect
                createConfetti();
            }, 500);
        });
        
        // Add ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(2);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
        
        // Confetti effect
        function createConfetti() {
            const colors = ['#ffbe0b', '#fb5607', '#ff006e', '#8338ec', '#3a86ff'];
            const confettiCount = 50;
            
            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = Math.random() * 10 + 5 + 'px';
                confetti.style.height = confetti.style.width;
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.zIndex = '101';
                confetti.style.pointerEvents = 'none';
                document.body.appendChild(confetti);
                
                anime({
                    targets: confetti,
                    translateY: window.innerHeight + 100,
                    translateX: (Math.random() - 0.5) * 400,
                    rotate: Math.random() * 720,
                    opacity: [1, 0],
                    duration: Math.random() * 2000 + 1500,
                    easing: 'easeInQuad',
                    complete: () => confetti.remove()
                });
            }
        }
        
        // Close overlay on click
        successOverlay.addEventListener('click', () => {
            successOverlay.classList.remove('active');
        });
        
        // Input focus animation
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                anime({
                    targets: input,
                    scale: [1, 1.02],
                    duration: 200,
                    easing: 'easeOutQuad'
                });
            });
            
            input.addEventListener('blur', () => {
                anime({
                    targets: input,
                    scale: [1.02, 1],
                    duration: 200,
                    easing: 'easeOutQuad'
                });
            });
        });
        
        // Social button animations
        const socialBtns = document.querySelectorAll('.social-btn');
        socialBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                anime({
                    targets: this,
                    rotate: [0, 360],
                    scale: [1, 1.2, 1],
                    duration: 600,
                    easing: 'easeOutElastic(1, .8)'
                });
            });
        });
        
        // Floating orbs click interaction
        document.querySelectorAll('.orb').forEach(orb => {
            orb.addEventListener('click', function() {
                anime({
                    targets: this,
                    scale: [1, 1.5, 1],
                    duration: 400,
                    easing: 'easeOutElastic(1, .8)'
                });
            });
        });
    </script>
</body>
</html>
